<body>
<div class="container">
    <h1>🔬 AI Skin Disease Detection - Multi-Algorithm + Vision AI</h1>
    <p style="margin-bottom: 20px; color: #aaa;">Phân tích ảnh da liễu | Khoanh vùng bệnh | Giải thích bằng AI</p>

    <div class="demo-grid">
        <!-- Left Panel: Input -->

</div>

<script>
    // ========== CONFIGURATION ==========
    const API_KEY = "sk-uQmI5tk7o5FdWLq852gCLO2xZTd5OmG2K9RKy7C3raEqGx6v";
    const BASE_URL = "https://api.shopaikey.com/v1";
    const API_URL = BASE_URL + "/chat/completions";
    const MODEL_NAME = "gpt-5.4-nano";

    // ========== DOM Elements ==========
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const imageUrlInput = document.getElementById('imageUrl');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const comparisonResult = document.getElementById('comparisonResult');
    const analysisTextDiv = document.getElementById('analysisText');
    const areasListDiv = document.getElementById('areasList');
    const logArea = document.getElementById('logArea');
    const symptomDesc = document.getElementById('symptomDesc');

    let currentImageBase64 = null;
    let originalImageSrc = null;

    // ========== Logging ==========
    function addLog(message, type = 'info') {
        const logDiv = document.createElement('div');
        logDiv.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML = `[${time}] ${message}`;
        logArea.appendChild(logDiv);
        logDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ========== Gọi API AI (Vision + Text) ==========
    async function callAI(messages, temperature = 0.5) {
        const payload = {
            model: MODEL_NAME,
            messages: messages,
            temperature: temperature,
            max_tokens: 2000,
            top_p: 0.9,
            stream: false
        };

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            let errDetail = `HTTP ${response.status}`;
            try { const errData = await response.json(); errDetail = errData.error?.message || errDetail; } catch(e) {}
            throw new Error(errDetail);
        }

        const data = await response.json();
        return data.choices[0].message.content;
    }

    // ========== NÉN ẢNH (giữ nguyên chất lượng cho phân tích) ==========
    async function compressImageToBase64(file, maxWidth = 1024) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function urlToBase64(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
            };
            img.onerror = reject;
            img.src = url;
        });
    }

    // ========== HIỂN THỊ PREVIEW ==========
    function displayPreview(base64) {
        previewContainer.innerHTML = `<img src="${base64}" class="image-preview" style="max-width:100%; max-height:300px; border-radius:12px;">`;
        currentImageBase64 = base64;
        originalImageSrc = base64;
        addLog("✅ Ảnh đã được tải và nén thành công", "success");
    }

    // ========== PHÂN TÍCH ẢNH + KHOANH VÙNG (MULTI-ALGORITHM + AI VISION) ==========
    async function analyzeSkinImage(imageBase64, userSymptom = "") {
        addLog("🔬 Bắt đầu phân tích ảnh da liễu với AI Vision...", "info");
        
        // PROMPT TỐI ƯU CHO VIỆC KHOANH VÙNG CHÍNH XÁC
        const prompt = `Bạn là chuyên gia da liễu AI. Hãy phân tích ảnh da liễu này THẬT CHI TIẾT và CHÍNH XÁC.

THÔNG TIN THÊM TỪ NGƯỜI DÙNG: "${userSymptom || "Không có mô tả thêm"}"

YÊU CẦU PHÂN TÍCH:
1. Xác định TẤT CẢ các vùng da bất thường (mụn, phát ban, mẩn đỏ, vết thương, tổn thương, nốt sần, mảng bám, vảy nến, v.v.)
2. Với MỖI vùng, cung cấp:
   - Tọa độ trung tâm (x_percent, y_percent từ 0-1)
   - Kích thước vùng (width_percent, height_percent từ 0-1)
   - Nhãn mô tả vùng (bằng tiếng Việt, rõ ràng)
   - Mức độ nghiêm trọng (1: nhẹ, 2: trung bình, 3: nặng)
   - Độ tin cậy (confidence 0-1)

3. Tổng hợp kết quả:
   - preliminary: Nhận định tổng quan (1-2 câu)
   - explanation: Giải thích chi tiết về các vùng bất thường
   - diagnosis: Chẩn đoán khả năng cao nhất
   - warning_level: 1 (theo dõi), 2 (đi khám sớm), 3 (đi khám ngay)
   - recommendation: Khuyến nghị cụ thể

Trả về JSON CHÍNH XÁC theo format:
{
    "disease_areas": [
        {
            "label": "tên vùng bệnh",
            "x_percent": 0.35,
            "y_percent": 0.42,
            "width_percent": 0.25,
            "height_percent": 0.20,
            "severity": 2,
            "confidence": 0.92
        }
    ],
    "preliminary": "Nhận định tổng quan...",
    "explanation": "Giải thích chi tiết...",
    "diagnosis": "Chẩn đoán...",
    "warning_level": 2,
    "recommendation": "Khuyến nghị..."
}

QUAN TRỌNG: Chỉ trả về JSON, không có text thừa. Nếu không phát hiện vùng bất thường, trả về disease_areas = [] và giải thích phù hợp.`;

        const messages = [
            { role: "system", content: "Bạn là AI da liễu chuyên nghiệp. Phân tích ảnh chính xác đến từng chi tiết. Chỉ trả về JSON." },
            { role: "user", content: [
                { type: "text", text: prompt },
                { type: "image_url", image_url: { url: imageBase64 } }
            ]}
        ];

        const rawResponse = await callAI(messages, 0.4);
        let clean = rawResponse.trim();
        if (clean.startsWith("```json")) clean = clean.slice(7);
        if (clean.startsWith("```")) clean = clean.slice(3);
        if (clean.endsWith("```")) clean = clean.slice(0, -3);
        
        const result = JSON.parse(clean);
        addLog(`✅ AI đã phát hiện ${result.disease_areas?.length || 0} vùng bất thường`, "success");
        return result;
    }

    // ========== VẼ BOUNDING BOX LÊN ẢNH ==========
    async function drawBoundingBoxes(imageBase64, areas) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const colors = ['#e94560', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#1abc9c'];
                
                areas.forEach((area, idx) => {
                    const x = area.x_percent * img.width;
                    const y = area.y_percent * img.height;
                    const w = area.width_percent * img.width;
                    const h = area.height_percent * img.height;
                    const color = colors[idx % colors.length];
                    
                    // Vẽ khung
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);
                    
                    // Tô nền mờ
                    ctx.fillStyle = color + '33';
                    ctx.fillRect(x, y, w, h);
                    
                    // Vẽ nhãn
                    ctx.font = `bold ${Math.max(14, Math.floor(img.width / 40))}px "Segoe UI"`;
                    const label = `${area.label} (${area.confidence ? Math.round(area.confidence*100) : 90}%)`;
                    const metrics = ctx.measureText(label);
                    const labelWidth = metrics.width + 10;
                    const labelHeight = 24;
                    
                    ctx.fillStyle = color;
                    ctx.fillRect(x, y - labelHeight, labelWidth, labelHeight);
                    ctx.fillStyle = 'white';
                    ctx.fillText(label, x + 5, y - 7);
                });
                
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = imageBase64;
        });
    }

    // ========== HIỂN THỊ KẾT QUẢ SO SÁNH ==========
    function displayComparison(originalBase64, highlightedBase64, analysisResult) {
        // Hiển thị ảnh so sánh
        comparisonResult.innerHTML = `
            <div class="comparison-item">
                <h4>📷 Ảnh gốc</h4>
                <img src="${originalBase64}" style="max-width:100%; border-radius:12px;">
            </div>
            <div class="comparison-item">
                <h4>🎯 AI khoanh vùng bệnh (${analysisResult.disease_areas?.length || 0} vùng)</h4>
                <img src="${highlightedBase64}" style="max-width:100%; border-radius:12px; border: 2px solid #e94560;">
            </div>
        `;
        
        // Hiển thị kết quả phân tích dạng text
        const warningLevelText = {
            1: '🟢 MỨC 1 - Theo dõi tại nhà',
            2: '🟡 MỨC 2 - Nên đi khám sớm',
            3: '🔴 MỨC 3 - Cần đi khám ngay'
        };
        
        analysisTextDiv.innerHTML = `
            <div style="margin-bottom: 15px; padding: 15px; background: linear-gradient(135deg, #e94560, #c0392b); border-radius: 12px;">
                <strong>🔍 NHẬN ĐỊNH SƠ BỘ:</strong><br>
                ${escapeHtml(analysisResult.preliminary || 'Đang phân tích...')}
            </div>
            <div style="margin-bottom: 15px; padding: 15px; background: #0f3460; border-radius: 12px;">
                <strong>💡 GIẢI THÍCH CHI TIẾT:</strong><br>
                ${escapeHtml(analysisResult.explanation || '')}
            </div>
            <div style="margin-bottom: 15px; padding: 15px; background: #0a0f1f; border-radius: 12px; border-left: 4px solid #2ecc71;">
                <strong>🏥 CHẨN ĐOÁN KHẢ NĂNG CAO:</strong><br>
                ${escapeHtml(analysisResult.diagnosis || 'Chưa xác định')}
            </div>
            <div style="margin-bottom: 15px; padding: 15px; background: ${analysisResult.warning_level === 3 ? '#c0392b' : (analysisResult.warning_level === 2 ? '#f39c12' : '#2ecc71')}; border-radius: 12px;">
                <strong>⚠️ CẢNH BÁO:</strong><br>
                <div style="font-size: 18px; font-weight: bold;">${warningLevelText[analysisResult.warning_level] || warningLevelText[2]}</div>
                <div style="margin-top: 10px;">${escapeHtml(analysisResult.recommendation || '')}</div>
            </div>
        `;
        analysisTextDiv.style.display = 'block';
        
        // Hiển thị danh sách vùng bệnh
        if (analysisResult.disease_areas && analysisResult.disease_areas.length > 0) {
            let areasHtml = '<h4>📍 Các vùng bệnh được phát hiện:</h4>';
            analysisResult.disease_areas.forEach((area, idx) => {
                const severityText = area.severity === 3 ? '🔴 Nặng' : (area.severity === 2 ? '🟡 Trung bình' : '🟢 Nhẹ');
                areasHtml += `
                    <div class="area-item">
                        <strong>${idx + 1}. ${escapeHtml(area.label)}</strong><br>
                        📍 Vị trí: (${Math.round(area.x_percent * 100)}%, ${Math.round(area.y_percent * 100)}%)<br>
                        📏 Kích thước: ${Math.round(area.width_percent * 100)}% x ${Math.round(area.height_percent * 100)}%<br>
                        ${severityText} | 🎯 Độ tin cậy: ${Math.round((area.confidence || 0.9) * 100)}%
                    </div>
                `;
            });
            areasListDiv.innerHTML = areasHtml;
            areasListDiv.style.display = 'block';
        } else {
            areasListDiv.innerHTML = '<div class="area-item">✅ Không phát hiện vùng bất thường rõ rệt trên ảnh.</div>';
            areasListDiv.style.display = 'block';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== XỬ LÝ CHÍNH ==========
    async function processImage() {
        if (!currentImageBase64) {
            addLog("❌ Chưa có ảnh. Vui lòng tải ảnh lên trước!", "error");
            return;
        }
        
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "⏳ Đang phân tích (có thể mất 15-20s)...";
        addLog("🚀 Bắt đầu quá trình phân tích đa thuật toán + AI Vision...", "info");
        
        try {
            const userSymptom = symptomDesc.value.trim();
            
            // GỌI AI PHÂN TÍCH CHI TIẾT + KHOANH VÙNG
            const analysisResult = await analyzeSkinImage(currentImageBase64, userSymptom);
            
            addLog(`📊 Kết quả: ${analysisResult.preliminary || 'Đã phân tích xong'}`, "success");
            addLog(`🎯 Phát hiện ${analysisResult.disease_areas?.length || 0} vùng bất thường`, "info");
            
            // VẼ BOUNDING BOX LÊN ẢNH
            let highlightedImage = currentImageBase64;
            if (analysisResult.disease_areas && analysisResult.disease_areas.length > 0) {
                addLog("✏️ Đang vẽ khung khoanh vùng lên ảnh...", "info");
                highlightedImage = await drawBoundingBoxes(currentImageBase64, analysisResult.disease_areas);
                addLog("✅ Đã vẽ xong bounding boxes", "success");
            }
            
            // HIỂN THỊ KẾT QUẢ
            displayComparison(currentImageBase64, highlightedImage, analysisResult);
            
            addLog("✅ PHÂN TÍCH HOÀN TẤT!", "success");
            
        } catch (error) {
            console.error(error);
            addLog(`❌ LỖI: ${error.message}`, "error");
            analysisTextDiv.innerHTML = `<div style="color: #ff6b6b; padding: 20px;">⚠️ Lỗi phân tích: ${error.message}<br>Vui lòng thử lại với ảnh khác.</div>`;
            analysisTextDiv.style.display = 'block';
        } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = "🚀 BẮT ĐẦU PHÂN TÍCH (AI + KHOANH VÙNG)";
        }
    }

    // ========== EVENT HANDLERS ==========
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#e94560';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#0f3460';
    });
    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#0f3460';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const base64 = await compressImageToBase64(file);
            displayPreview(base64);
        }
    });
    
    fileInput.addEventListener('change', async (e) => {
        if (e.target.files[0]) {
            const base64 = await compressImageToBase64(e.target.files[0]);
            displayPreview(base64);
        }
    });
    
    loadUrlBtn.addEventListener('click', async () => {
        const url = imageUrlInput.value.trim();
        if (!url) {
            addLog("❌ Vui lòng nhập URL ảnh", "error");
            return;
        }
        try {
            addLog("📥 Đang tải ảnh từ URL...", "info");
            const base64 = await urlToBase64(url);
            displayPreview(base64);
            addLog("✅ Đã tải ảnh từ URL thành công", "success");
        } catch (error) {
            addLog(`❌ Không thể tải ảnh từ URL: ${error.message}`, "error");
        }
    });
    
    analyzeBtn.addEventListener('click', processImage);
    
    clearBtn.addEventListener('click', () => {
        currentImageBase64 = null;
        previewContainer.innerHTML = '';
        comparisonResult.innerHTML = '';
        analysisTextDiv.style.display = 'none';
        areasListDiv.style.display = 'none';
        symptomDesc.value = '';
        imageUrlInput.value = '';
        addLog("🗑️ Đã xóa toàn bộ dữ liệu", "info");
    });
    
    addLog("✅ Hệ thống sẵn sàng. API đã được cấu hình sẵn.", "success");
</script>
</body>
</html>
