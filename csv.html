<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Firebase to CSV - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-primary: #3b82f6;
            --pink-primary: #f472b6;
            --grad-blue-pink: linear-gradient(135deg, #3b82f6, #f472b6);
            --bg-body: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe0ec;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body.dark {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: 36px;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .header p {
            color: var(--text-dim);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--pink-primary);
        }

        .stat-card.selected {
            border-color: var(--blue-primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Fraunces', serif;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        /* Export Panel */
        .export-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border-light);
            margin-bottom: 30px;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .export-title {
            font-family: 'Fraunces', serif;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--grad-blue-pink);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-mid);
        }

        .btn-outline:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: var(--border-light);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--grad-blue-pink);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-dim);
            text-align: center;
        }

        /* Preview Table */
        .preview-container {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .preview-header {
            padding: 16px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .preview-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            background: var(--card-bg);
            font-weight: 600;
            position: sticky;
            top: 0;
            color: var(--blue-primary);
        }

        tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .loading-spinner {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .loading-spinner i {
            font-size: 40px;
            color: var(--blue-primary);
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .btn-group { width: 100%; justify-content: center; }
            .export-header { flex-direction: column; align-items: stretch; }
            th, td { padding: 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-database"></i> Xuất dữ liệu Firebase</h1>
            <p>Chọn collection cần xuất và tải về file CSV</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <!-- Stats will be loaded here -->
        </div>

        <div class="export-panel">
            <div class="export-header">
                <div class="export-title">
                    <i class="fas fa-file-export"></i>
                    <span id="selectedCollectionName">Chưa chọn collection</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline" id="refreshBtn" onclick="loadAllStats()">
                        <i class="fas fa-sync-alt"></i> Làm mới
                    </button>
                    <button class="btn btn-primary" id="exportBtn" onclick="exportToCSV()" disabled>
                        <i class="fas fa-download"></i> Xuất CSV
                    </button>
                    <button class="btn btn-success" id="exportAllBtn" onclick="exportAllCollections()">
                        <i class="fas fa-layer-group"></i> Xuất tất cả
                    </button>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Đang tải dữ liệu...</div>
            </div>
        </div>

        <div class="preview-container">
            <div class="preview-header">
                <div class="preview-title">
                    <i class="fas fa-table"></i>
                    <span>Xem trước dữ liệu</span>
                </div>
                <span id="recordCount" style="font-size: 13px; color: var(--text-dim);">0 bản ghi</span>
            </div>
            <div class="table-wrapper" id="tableWrapper">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                    <p>Chọn một collection bên trên để xem dữ liệu</p>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>Đang tải dữ liệu...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b",
            measurementId: "G-GSP46EVLYG"
        };

        firebase.initializeApp(firebaseConfig);

        // App Check
        const appCheck = firebase.appCheck();
        appCheck.activate(
            new firebase.appCheck.ReCaptchaEnterpriseProvider(
                '6LfZOsIsAAAAAK_vBWSNgolKHjLsfWxGBicixs37'
            ),
            true
        );

        const db = firebase.firestore();
        const auth = firebase.auth();

        // Collections configuration
        const COLLECTIONS = [
            { id: 'handbook', name: '📚 Cẩm nang sức khỏe', icon: 'fa-book-medical' },
            { id: 'news', name: '📰 Bản tin y tế', icon: 'fa-newspaper' },
            { id: 'posts', name: '💬 Bài đăng diễn đàn', icon: 'fa-comments' },
            { id: 'courses', name: '🎓 Khóa học', icon: 'fa-graduation-cap' },
            { id: 'courseQuestions', name: '❓ Câu hỏi khóa học', icon: 'fa-question-circle' },
            { id: 'medicalLocations', name: '📍 Cơ sở y tế', icon: 'fa-hospital' },
            { id: 'health_chats', name: '💬 Lịch sử chat', icon: 'fa-message' },
            { id: 'checkin_records', name: '📋 Phiếu check-in', icon: 'fa-clipboard-list' },
            { id: 'knowledge_base', name: '🧠 Kiến thức AI', icon: 'fa-brain' },
            { id: 'users', name: '👤 Người dùng', icon: 'fa-users' }
        ];

        let currentCollection = null;
        let currentData = [];
        let collectionStats = {};

        // Helper: Show toast message
        function showToast(message, isError = false) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Helper: Format Firestore timestamp
        function formatTimestamp(value) {
            if (!value) return '';
            if (value.toDate && typeof value.toDate === 'function') {
                return value.toDate().toISOString();
            }
            if (value.seconds) {
                return new Date(value.seconds * 1000).toISOString();
            }
            return value;
        }

        // Helper: Convert object to flat CSV row
        function flattenObject(obj, prefix = '') {
            let result = {};
            for (let key in obj) {
                if (obj.hasOwnProperty(key)) {
                    const newKey = prefix ? `${prefix}.${key}` : key;
                    const value = obj[key];
                    
                    if (value && typeof value === 'object' && !(value instanceof Date) && !(value.toDate)) {
                        if (Array.isArray(value)) {
                            result[newKey] = JSON.stringify(value);
                        } else {
                            Object.assign(result, flattenObject(value, newKey));
                        }
                    } else {
                        result[newKey] = formatTimestamp(value);
                    }
                }
            }
            return result;
        }

        // Get all keys from data array
        function getAllKeys(data) {
            const keysSet = new Set();
            data.forEach(item => {
                const flat = flattenObject(item);
                Object.keys(flat).forEach(key => keysSet.add(key));
            });
            return Array.from(keysSet).sort();
        }

        // Convert data to CSV
        function convertToCSV(data) {
            if (!data || data.length === 0) return '';
            
            const keys = getAllKeys(data);
            const csvRows = [];
            
            // Header row
            csvRows.push(keys.map(key => `"${key.replace(/"/g, '""')}"`).join(','));
            
            // Data rows
            for (const item of data) {
                const flat = flattenObject(item);
                const values = keys.map(key => {
                    let value = flat[key] !== undefined ? flat[key] : '';
                    if (typeof value === 'string') {
                        value = value.replace(/"/g, '""');
                        return `"${value}"`;
                    }
                    return value;
                });
                csvRows.push(values.join(','));
            }
            
            return csvRows.join('\n');
        }

        // Download CSV file
        function downloadCSV(data, filename) {
            const csv = convertToCSV(data);
            if (!csv) {
                showToast('Không có dữ liệu để xuất!', true);
                return;
            }
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast(`Đã xuất ${data.length} bản ghi thành công!`);
        }

        // Load collection data
        async function loadCollectionData(collectionId, showPreview = true) {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            loadingOverlay.style.display = 'flex';
            progressContainer.style.display = 'block';
            progressFill.style.width = '30%';
            progressText.textContent = 'Đang kết nối Firestore...';
            
            try {
                progressFill.style.width = '50%';
                progressText.textContent = 'Đang tải dữ liệu...';
                
                const snapshot = await db.collection(collectionId).get();
                const data = [];
                
                snapshot.forEach(doc => {
                    data.push({ id: doc.id, ...doc.data() });
                });
                
                progressFill.style.width = '100%';
                progressText.textContent = `Đã tải ${data.length} bản ghi!`;
                
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                }, 1000);
                
                currentData = data;
                
                if (showPreview) {
                    displayPreview(data);
                }
                
                return data;
            } catch (error) {
                console.error('Error loading collection:', error);
                showToast('Lỗi khi tải dữ liệu: ' + error.message, true);
                progressContainer.style.display = 'none';
                return [];
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        // Display preview table
        function displayPreview(data) {
            const tableWrapper = document.getElementById('tableWrapper');
            const recordCountSpan = document.getElementById('recordCount');
            
            if (!data || data.length === 0) {
                tableWrapper.innerHTML = `<div class="empty-state">
                    <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                    <p>Không có dữ liệu trong collection này</p>
                </div>`;
                recordCountSpan.textContent = '0 bản ghi';
                return;
            }
            
            recordCountSpan.textContent = `${data.length} bản ghi`;
            
            // Get first 5 items for preview
            const previewData = data.slice(0, 10);
            const keys = getAllKeys(previewData);
            const displayKeys = keys.slice(0, 6); // Show max 6 columns for preview
            
            let html = '<table><thead><tr>';
            displayKeys.forEach(key => {
                html += `<th>${escapeHtml(key)}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            previewData.forEach(item => {
                const flat = flattenObject(item);
                html += '<tr>';
                displayKeys.forEach(key => {
                    let value = flat[key] !== undefined ? flat[key] : '';
                    if (typeof value === 'string' && value.length > 50) {
                        value = value.substring(0, 50) + '...';
                    }
                    html += `<td title="${escapeHtml(String(flat[key] || ''))}">${escapeHtml(String(value))}</td>`;
                });
                html += '</tr>';
            });
            
            if (data.length > 10) {
                html += `<tr><td colspan="${displayKeys.length}" style="text-align: center; color: var(--text-dim);">
                    <i class="fas fa-ellipsis-h"></i> và ${data.length - 10} bản ghi khác
                </td></tr>`;
            }
            
            html += '</tbody></table>';
            tableWrapper.innerHTML = html;
        }

        // Load all collection stats
        async function loadAllStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center;"><i class="fas fa-spinner fa-pulse"></i> Đang tải thống kê...</div>';
            
            for (const collection of COLLECTIONS) {
                try {
                    const snapshot = await db.collection(collection.id).limit(1).get();
                    // Get actual count using aggregation (Firestore doesn't support count without query)
                    const countSnapshot = await db.collection(collection.id).get();
                    collectionStats[collection.id] = countSnapshot.size;
                } catch (error) {
                    console.error(`Error loading stats for ${collection.id}:`, error);
                    collectionStats[collection.id] = 0;
                }
            }
            
            displayStats();
        }

        // Display stats cards
        function displayStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = COLLECTIONS.map(collection => {
                const count = collectionStats[collection.id] || 0;
                const isSelected = currentCollection === collection.id;
                return `
                    <div class="stat-card ${isSelected ? 'selected' : ''}" onclick="selectCollection('${collection.id}')">
                        <div class="stat-icon"><i class="fas ${collection.icon}"></i></div>
                        <div class="stat-number">${count.toLocaleString()}</div>
                        <div class="stat-label">${collection.name}</div>
                    </div>
                `;
            }).join('');
        }

        // Select collection
        async function selectCollection(collectionId) {
            currentCollection = collectionId;
            const collection = COLLECTIONS.find(c => c.id === collectionId);
            document.getElementById('selectedCollectionName').innerHTML = `<i class="fas ${collection.icon}"></i> ${collection.name}`;
            
            // Enable export button
            const exportBtn = document.getElementById('exportBtn');
            exportBtn.disabled = false;
            
            // Update selected state in UI
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Load data
            await loadCollectionData(collectionId, true);
            displayStats();
        }

        // Export current collection to CSV
        async function exportToCSV() {
            if (!currentCollection) {
                showToast('Vui lòng chọn collection cần xuất!', true);
                return;
            }
            
            const collection = COLLECTIONS.find(c => c.id === currentCollection);
            const data = await loadCollectionData(currentCollection, false);
            
            if (!data || data.length === 0) {
                showToast('Không có dữ liệu để xuất!', true);
                return;
            }
            
            const filename = `${currentCollection}_export_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.csv`;
            downloadCSV(data, filename);
        }

        // Export all collections
        async function exportAllCollections() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.style.display = 'flex';
            
            const allData = {};
            let totalRecords = 0;
            
            for (const collection of COLLECTIONS) {
                try {
                    const data = await loadCollectionData(collection.id, false);
                    allData[collection.id] = data;
                    totalRecords += data.length;
                } catch (error) {
                    console.error(`Error exporting ${collection.id}:`, error);
                    allData[collection.id] = [];
                }
            }
            
            loadingOverlay.style.display = 'none';
            
            if (totalRecords === 0) {
                showToast('Không có dữ liệu nào để xuất!', true);
                return;
            }
            
            // Create zip-like structure - export each collection as separate CSV
            // Since we can't create zip easily in browser, we'll offer to download one by one
            if (confirm(`Tổng cộng ${totalRecords} bản ghi từ ${COLLECTIONS.length} collection.\n\nBạn có muốn tải từng file CSV riêng cho mỗi collection không?`)) {
                for (const collection of COLLECTIONS) {
                    const data = allData[collection.id];
                    if (data && data.length > 0) {
                        const filename = `${collection.id}_export_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.csv`;
                        downloadCSV(data, filename);
                        await new Promise(resolve => setTimeout(resolve, 500)); // Delay between downloads
                    }
                }
                showToast(`Đã xuất ${COLLECTIONS.filter(c => allData[c.id]?.length > 0).length} file CSV!`);
            }
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Check authentication
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Check if admin
            if (user.email !== 'admin@eduhealth-ai.com') {
                showToast('Bạn không có quyền truy cập trang này!', true);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }
            
            await loadAllStats();
        });

        // Theme toggle
        const savedTheme = localStorage.getItem('eduhealth-theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }
        
        // Make functions global
        window.selectCollection = selectCollection;
        window.exportToCSV = exportToCSV;
        window.exportAllCollections = exportAllCollections;
        window.loadAllStats = loadAllStats;
    </script>
</body>
</html>
