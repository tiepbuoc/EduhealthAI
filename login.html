<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Đăng nhập - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            --grad-pink-blue: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            --bg-body: #ffffff;
            --bg-surface: #fef9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe4f0;
            --border-soft: #f1f5f9;
            --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .login-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 52px;
            height: 52px;
            background: var(--grad-blue-pink);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-mid);
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--grad-blue-pink);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: var(--danger);
            margin-left: 4px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            background: var(--bg-surface);
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--blue-primary);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            background: var(--grad-blue-pink);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-mid);
            font-family: 'DM Sans', sans-serif;
            z-index: 100;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
        }

        .terms-section {
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid var(--border-light);
        }

        .terms-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terms-title i {
            color: var(--pink-primary);
        }

        .terms-checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .terms-checkbox-item input {
            margin-top: 3px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-checkbox-item label {
            font-size: 13px;
            line-height: 1.45;
            color: var(--text-mid);
            cursor: pointer;
        }

        .terms-checkbox-item label a {
            color: var(--blue-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-checkbox-item label a:hover {
            text-decoration: underline;
        }

        .terms-note {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            text-align: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            display: none;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .modal-header h3 {
            font-family: 'Fraunces', serif;
            font-size: 22px;
            background: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-dim);
        }
        .modal-close:hover {
            color: var(--pink-primary);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .terms-full-content {
            line-height: 1.6;
            color: var(--text-mid);
            font-size: 14px;
        }
        .terms-full-content h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: var(--text-dark);
            font-family: 'Fraunces', serif;
        }
        .terms-full-content h2 {
            font-size: 18px;
            margin: 20px 0 12px;
            color: var(--blue-primary);
        }
        .terms-full-content h3 {
            font-size: 16px;
            margin: 16px 0 10px;
            color: var(--pink-primary);
        }
        .terms-full-content p {
            margin: 12px 0;
        }
        .terms-full-content ul {
            margin: 10px 0 10px 24px;
        }
        .terms-full-content li {
            margin: 6px 0;
        }
        .terms-full-content .contact-info {
            background: var(--grad-blue-pink);
            border-radius: 20px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .card { padding: 24px; }
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span></span></button>

    <div class="login-container">
        <a href="#" class="logo" id="logoLink">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" id="loginTabBtn">Đăng nhập</button>
                <button class="tab-btn" id="registerTabBtn">Đăng ký</button>
            </div>

            <div id="loginForm">
                <div id="loginError" class="error-message" style="display: none;"></div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <button class="btn-primary" id="loginBtn">Đăng nhập</button>
            </div>

            <div id="registerForm" style="display: none;">
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>
                
                <div class="form-group">
                    <label>Họ và tên <span class="required">*</span></label>
                    <input type="text" id="regFullName" class="form-control" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Số điện thoại <span class="required">*</span></label>
                    <input type="tel" id="regPhone" class="form-control" placeholder="0912345678">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>Ngày sinh <span class="required">*</span></label>
                        <input type="date" id="regDob" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Giới tính <span class="required">*</span></label>
                        <select id="regGender" class="form-control">
                            <option value="">-- Chọn --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="regEmail" class="form-control" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regConfirmPassword', this)"></i>
                    </div>
                </div>

                <!-- PHẦN ĐIỀU KHOẢN BẮT BUỘC ĐỒNG Ý -->
                <div class="terms-section">
                    <div class="terms-title">
                        <i class="fas fa-shield-alt"></i>
                        <span>Trước khi đăng ký, vui lòng xác nhận:</span>
                    </div>
                    
                    <div class="terms-checkbox-item" onclick="toggleCheckbox('termsChk1')">
                        <input type="checkbox" id="termsChk1">
                        <label>Tôi đồng ý với <a href="javascript:void(0)" onclick="event.stopPropagation(); openTermsModal('terms')">Điều khoản sử dụng</a></label>
                    </div>
                    
                    <div class="terms-checkbox-item" onclick="toggleCheckbox('termsChk2')">
                        <input type="checkbox" id="termsChk2">
                        <label>Tôi đồng ý với <a href="javascript:void(0)" onclick="event.stopPropagation(); openTermsModal('privacy')">Chính sách quyền riêng tư</a></label>
                    </div>
                    
                    <div class="terms-checkbox-item" onclick="toggleCheckbox('termsChk3')">
                        <input type="checkbox" id="termsChk3">
                        <label>Tôi hiểu EduHealth AI <strong>không phải công cụ chẩn đoán y khoa</strong>, không thay thế bác sĩ</label>
                    </div>
                    
                    <div class="terms-note">
                        <i class="fas fa-info-circle"></i> EduHealth AI là công cụ hỗ trợ ban đầu trong học đường, không thay thế bác sĩ.
                    </div>
                </div>

                <button class="btn-primary" id="registerBtn" disabled>Đăng ký</button>
            </div>
        </div>
    </div>

    <!-- Modal hiển thị điều khoản chi tiết (nội dung đã được nhúng sẵn) -->
    <div id="termsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Điều khoản sử dụng</h3>
                <button class="modal-close" onclick="closeTermsModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Nội dung sẽ được JavaScript chèn vào -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
    <script>
        // ==================== NỘI DUNG ĐIỀU KHOẢN VÀ CHÍNH SÁCH (NHÚNG SẴN) ====================
        const TERMS_CONTENT = `
            <div class="terms-full-content">
                <h1>ĐIỀU KHOẢN SỬ DỤNG</h1>
                <h2>EDUHEALTH AI</h2>
                <p><strong>Cập nhật lần cuối:</strong> 22/04/2026</p>
                <p>Chào mừng bạn đến với <strong>EduHealth AI</strong> -- nền tảng hỗ trợ giáo dục sức khỏe, nhận biết ban đầu và kết nối hỗ trợ trong học đường.</p>
                <p>Khi truy cập, đăng nhập hoặc sử dụng EduHealth AI, bạn xác nhận rằng mình đã đọc, hiểu và đồng ý với các điều khoản dưới đây.</p>

                <h2>1. Mục đích của nền tảng</h2>
                <p>EduHealth AI được xây dựng nhằm hỗ trợ người dùng:</p>
                <ul><li>tiếp cận thông tin sức khỏe học đường theo cách dễ hiểu, phù hợp;</li><li>thực hiện check-in sức khỏe ban đầu trong phạm vi hỗ trợ hiện tại của hệ thống;</li><li>nhận định hướng hành động ban đầu và kết nối với nguồn hỗ trợ phù hợp khi cần.</li></ul>
                <p><strong>LƯU Ý QUAN TRỌNG:</strong> EduHealth AI là <strong>công cụ hỗ trợ ban đầu</strong>, <strong>không phải công cụ chẩn đoán y khoa</strong>, <strong>không kê đơn</strong>, và <strong>không thay thế bác sĩ, phụ huynh, cán bộ y tế học đường hoặc cơ sở khám chữa bệnh</strong>.</p>

                <h2>2. Phạm vi sử dụng</h2>
                <p>Người dùng được phép sử dụng EduHealth AI cho mục đích học tập, tìm hiểu, hỗ trợ nhận biết ban đầu và tham khảo thông tin sức khỏe trong phạm vi phù hợp với định hướng của nền tảng.</p>

                <h2>3. Tài khoản và quyền truy cập</h2>
                <p>Khi tạo tài khoản hoặc sử dụng hệ thống, người dùng có trách nhiệm:</p>

                <h2>4. Nội dung người dùng cung cấp</h2>
                <p>Khi sử dụng các chức năng như Check-in sức khỏe, người dùng có thể cung cấp một số nội dung như: mô tả triệu chứng, câu trả lời checklist, hình ảnh tải lên, nội dung trò chuyện hoặc phản hồi.</p>
                <p>Người dùng cam kết chỉ cung cấp thông tin cần thiết, phù hợp với mục đích sử dụng của hệ thống và không cố ý nhập thông tin sai lệch, gây nhiễu hoặc làm ảnh hưởng đến kết quả hỗ trợ ban đầu.</p>

                <h2>5. Giới hạn chuyên môn của hệ thống</h2>
                <p>EduHealth AI chỉ cung cấp <strong>hỗ trợ nhận biết ban đầu</strong> dựa trên dữ liệu người dùng cung cấp và trong phạm vi phát triển hiện tại của hệ thống.</p>

                <p><strong>Trong trường hợp khẩn cấp:</strong> Nếu người dùng có dấu hiệu bất thường, triệu chứng kéo dài, đau nhiều, sưng nặng, sốt, khó thở, hoặc bất kỳ biểu hiện nào gây lo ngại, người dùng cần <strong>ưu tiên liên hệ phụ huynh, cán bộ y tế học đường hoặc cơ sở y tế</strong>.</p>

                <h2>6. Quyền sở hữu nội dung và hệ thống</h2>
