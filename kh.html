<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Khóa học - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, #4f8eff, #ff7eb3);
            --grad-pink-blue: linear-gradient(135deg, #ff6ba6, #4f8eff);
            --bg-body: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            --bg-surface: #fff5f8;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe0ec;
            --border-soft: #fef0f5;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05);
            --shadow-md: 0 20px 35px -12px rgba(0,0,0,0.1);
            --nav-bg: rgba(255,255,255,0.95);
            --tag-bg: #fce7f3;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body.dark {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
            --border-soft: #2d3a4e;
            --nav-bg: rgba(15,23,42,0.95);
            --tag-bg: #2d3a4e;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            transition: all 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            height: 74px;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: var(--grad-blue-pink);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 26px;
            font-weight: 700;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 500;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .course-card {
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--pink-primary);
        }

        .course-cover {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: var(--tag-bg);
        }

        .course-info {
            padding: 20px;
        }

        .course-title {
            font-family: 'Fraunces', serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .course-desc {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-dim);
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .modal-header {
            flex-shrink: 0;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }

        .modal-header h3 {
            font-family: 'Fraunces', serif;
            font-size: 22px;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .modal-close:hover { color: var(--pink-primary); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .course-detail-video {
            margin: 20px 0;
            border-radius: 16px;
            overflow: hidden;
        }

        .course-detail-video iframe {
            width: 100%;
            height: 315px;
            border-radius: 16px;
        }

        .course-detail-content {
            line-height: 1.6;
            color: var(--text-mid);
            margin: 20px 0;
        }

        .quiz-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-light);
        }

        .quiz-question {
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .quiz-question-text {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background: var(--card-bg);
            border: 2px solid var(--border-light);
            border-radius: 16px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quiz-option:hover {
            border-color: var(--blue-primary);
            transform: translateX(5px);
        }

        .quiz-option.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .quiz-option.wrong {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .quiz-option-letter {
            font-weight: 700;
            width: 30px;
        }

        .btn-join {
            background: var(--grad-blue-pink);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
        }

        .btn-join:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== GIẤY CHỨNG NHẬN - GIỐNG CODE TẠO ẢNH CHỮ ĐỒ ========== */
        .certificate-container {
            background: linear-gradient(135deg, #fff9e6 0%, #fff 100%);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
            border: 3px solid #ffd700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .certificate-container::before {
            content: "🏆";
            font-size: 50px;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 20px;
        }

        .certificate-title {
            font-size: 32px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 20px;
            font-family: 'Fraunces', serif;
        }

        .certificate-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .certificate-student {
            font-size: 36px;
            font-weight: bold;
            color: #1a2b44;
            margin: 20px 0;
            padding: 10px 20px;
            border-bottom: 3px solid #d4af37;
            display: inline-block;
            font-family: 'Fraunces', serif;
        }

        .certificate-course {
            font-size: 24px;
            color: #764ba2;
            margin: 20px 0;
            font-weight: 600;
        }

        .certificate-score {
            font-size: 18px;
            color: #28a745;
            margin: 15px 0;
            font-weight: 600;
        }

        .certificate-date {
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }

        .certificate-signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
        }

        .certificate-signature {
            text-align: center;
            flex: 1;
        }

        .certificate-signature-line {
            width: 200px;
            border-top: 2px solid #333;
            margin: 0 auto 10px;
        }

        .certificate-signature-text {
            font-size: 14px;
            color: #666;
        }

        .certificate-code {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }

        .certificate-seal {
            margin-top: 20px;
            font-size: 48px;
            opacity: 0.3;
        }

        .result-stats {
            text-align: center;
            padding: 30px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            background: var(--grad-blue-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        .btn-download-cert {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download-cert:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.3);
        }

        .btn-close-modal {
            background: #6c757d;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            margin-left: 10px;
            font-size: 16px;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            .course-grid { grid-template-columns: 1fr; }
            .modal-content { max-width: 95%; }
            .course-detail-video iframe { height: 200px; }
            .certificate-student { font-size: 24px; }
            .certificate-course { font-size: 18px; }
            .certificate-title { font-size: 24px; }
            .certificate-signature-line { width: 100px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>
        <button class="theme-toggle" id="themeToggleBtn" style="background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 16px; cursor: pointer;"><i class="fas fa-moon"></i> Chế độ tối</button>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-graduation-cap"></i> Khóa học sức khỏe học đường</h1>
        </div>
        <div class="course-grid" id="courseGrid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Đang tải khóa học...</div>
        </div>
    </div>

    <!-- Modal chi tiết khóa học -->
    <div id="courseModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Chi tiết khóa học</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b",
            measurementId: "G-GSP46EVLYG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCourses = [];
        let allQuestions = [];
        let currentCourse = null;
        let currentQuestions = [];
        let shuffledQuestions = [];
        let currentQuestionIndex = 0;
        let correctAnswers = 0;
        let studentName = '';
        let canAnswer = true;
        let certificateDataURL = null;

        async function loadCourses() {
            try {
                const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
                allCourses = [];
                snapshot.forEach(doc => {
                    allCourses.push({ id: doc.id, ...doc.data() });
                });
                
                const qSnapshot = await db.collection('courseQuestions').get();
                allQuestions = [];
                qSnapshot.forEach(doc => {
                    allQuestions.push({ id: doc.id, ...doc.data() });
                });
                
                displayCourses();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('courseGrid').innerHTML = '<div class="loading-spinner">⚠️ Lỗi tải dữ liệu</div>';
            }
        }

        function displayCourses() {
            const container = document.getElementById('courseGrid');
            if (allCourses.length === 0) {
                container.innerHTML = '<div class="loading-spinner">📭 Chưa có khóa học nào</div>';
                return;
            }
            
            container.innerHTML = allCourses.map(course => {
                const courseQuestions = allQuestions.filter(q => q.courseId === course.id);
                return `
                    <div class="course-card" onclick="openCourse('${course.id}')">
                        ${course.coverImage ? `<img class="course-cover" src="${course.coverImage}" onerror="this.src='https://placehold.co/400x200?text=Course'">` : 
                            `<div class="course-cover" style="display: flex; align-items: center; justify-content: center; font-size: 64px; background: var(--tag-bg);">${course.emoji || '📚'}</div>`}
                        <div class="course-info">
                            <div class="course-title">${course.emoji || '📚'} ${escapeHtml(course.title)}</div>
                            <div class="course-desc">${escapeHtml(course.shortDesc || '')}</div>
                            <div class="course-meta">
                                <span><i class="fas fa-question-circle"></i> ${courseQuestions.length} câu hỏi</span>
                                <span><i class="fas fa-eye"></i> ${course.views || 0} lượt xem</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getYouTubeEmbedUrl(url) {
            if (!url) return '';
            let videoId = '';
            if (url.includes('youtube.com/watch')) {
                videoId = url.split('v=')[1]?.split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1]?.split('?')[0];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : '';
        }

        async function openCourse(courseId) {
            currentCourse = allCourses.find(c => c.id === courseId);
            if (!currentCourse) return;
            
            await db.collection('courses').doc(courseId).update({ views: firebase.firestore.FieldValue.increment(1) });
            currentCourse.views = (currentCourse.views || 0) + 1;
            
            currentQuestions = allQuestions.filter(q => q.courseId === courseId);
            
            const modal = document.getElementById('courseModal');
            const modalBody = document.getElementById('modalBody');
            
            const embedUrl = getYouTubeEmbedUrl(currentCourse.videoUrl);
            
            modalBody.innerHTML = `
                <div class="course-detail">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <span style="font-size: 48px;">${currentCourse.emoji || '📚'}</span>
                        <h2 style="font-family: Fraunces, serif;">${escapeHtml(currentCourse.title)}</h2>
                    </div>
                    ${embedUrl ? `<div class="course-detail-video"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>` : ''}
                    <div class="course-detail-content">
                        <p>${escapeHtml(currentCourse.content || '')}</p>
                    </div>
                    <div class="quiz-section">
                        <h3 style="margin-bottom: 16px;"><i class="fas fa-question-circle"></i> Đánh giá kiến thức</h3>
                        <div id="quizContainer"></div>
                        <button class="btn-join" id="startQuizBtn" onclick="startQuiz()">🎯 Tham gia đánh giá</button>
                    </div>
                </div>
            `;
            
            document.getElementById('modalTitle').innerHTML = currentCourse.title;
            modal.classList.add('active');
        }

        function startQuiz() {
            if (currentQuestions.length === 0) {
                alert('Khóa học này chưa có câu hỏi đánh giá!');
                return;
            }
            
            studentName = prompt('📝 Vui lòng nhập tên của bạn:', '');
            if (!studentName || studentName.trim() === '') {
                studentName = 'Học sinh';
            }
            
            shuffledQuestions = [...currentQuestions];
            for (let i = shuffledQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
            }
            
            shuffledQuestions = shuffledQuestions.map(q => {
                if (q.type === 'multiple') {
                    const answerEntries = Object.entries(q.answers);
                    for (let i = answerEntries.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [answerEntries[i], answerEntries[j]] = [answerEntries[j], answerEntries[i]];
                    }
                    const shuffledAnswers = Object.fromEntries(answerEntries);
                    let newCorrectAnswer = null;
                    for (const [letter, text] of answerEntries) {
                        if (text === q.answers[q.correctAnswer]) {
                            newCorrectAnswer = letter;
                            break;
                        }
                    }
                    return { ...q, answers: shuffledAnswers, correctAnswer: newCorrectAnswer };
                }
                return q;
            });
            
            currentQuestionIndex = 0;
            correctAnswers = 0;
            canAnswer = true;
            
            displayQuizQuestion();
        }

        function displayQuizQuestion() {
            if (currentQuestionIndex >= shuffledQuestions.length) {
                showQuizResult();
                return;
            }
            
            const question = shuffledQuestions[currentQuestionIndex];
            const total = shuffledQuestions.length;
            
            let optionsHtml = '';
            if (question.type === 'multiple') {
                optionsHtml = Object.entries(question.answers).map(([letter, text]) => `
                    <div class="quiz-option" onclick="checkAnswer('${letter}')">
                        <div class="quiz-option-letter"><strong>${letter}.</strong></div>
                        <div>${escapeHtml(text)}</div>
                    </div>
                `).join('');
            } else {
                optionsHtml = `
                    <div class="quiz-option" onclick="checkAnswer('true')">
                        <div class="quiz-option-letter"><strong>✅</strong></div>
                        <div>Đúng</div>
                    </div>
                    <div class="quiz-option" onclick="checkAnswer('false')">
                        <div class="quiz-option-letter"><strong>❌</strong></div>
                        <div>Sai</div>
                    </div>
                `;
            }
            
            document.getElementById('quizContainer').innerHTML = `
                <div class="quiz-question">
                    <div class="quiz-question-text">Câu ${currentQuestionIndex + 1}/${total}: ${escapeHtml(question.text)}</div>
                    <div class="quiz-options" id="quizOptions">
                        ${optionsHtml}
                    </div>
                </div>
                <div style="margin-top: 12px; font-size: 14px; color: var(--text-dim);">
                    <i class="fas fa-info-circle"></i> Đang trả lời câu ${currentQuestionIndex + 1}/${total}
                </div>
            `;
            
            document.getElementById('startQuizBtn').style.display = 'none';
        }

        async function checkAnswer(selected) {
            if (!canAnswer) return;
            
            const question = shuffledQuestions[currentQuestionIndex];
            let isCorrect = false;
            
            if (question.type === 'multiple') {
                isCorrect = (selected === question.correctAnswer);
            } else {
                const isTrue = (selected === 'true');
                isCorrect = (isTrue === question.correctAnswer);
            }
            
            const options = document.querySelectorAll('.quiz-option');
            let selectedOption = null;
            
            for (let opt of options) {
                if (question.type === 'multiple') {
                    if (opt.innerHTML.includes(`${selected}.`)) {
                        selectedOption = opt;
                        break;
                    }
                } else {
                    if ((selected === 'true' && opt.innerHTML.includes('✅')) ||
                        (selected === 'false' && opt.innerHTML.includes('❌'))) {
                        selectedOption = opt;
                        break;
                    }
                }
            }
            
            if (selectedOption) {
                if (isCorrect) {
                    selectedOption.classList.add('correct');
                    correctAnswers++;
                } else {
                    selectedOption.classList.add('wrong');
                    for (let opt of options) {
                        if (question.type === 'multiple') {
                            if (opt.innerHTML.includes(`${question.correctAnswer}.`)) {
                                opt.classList.add('correct');
                                break;
                            }
                        } else {
                            const isTrueCorrect = question.correctAnswer === true;
                            if ((isTrueCorrect && opt.innerHTML.includes('✅')) ||
                                (!isTrueCorrect && opt.innerHTML.includes('❌'))) {
                                opt.classList.add('correct');
                                break;
                            }
                        }
                    }
                }
            }
            
            canAnswer = false;
            
            try {
                await db.collection('quizResults').add({
                    studentName: studentName,
                    courseId: currentCourse.id,
                    courseName: currentCourse.title,
                    questionId: question.id,
                    questionText: question.text,
                    isCorrect: isCorrect,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error('Error saving:', error);
            }
            
            setTimeout(() => {
                currentQuestionIndex++;
                canAnswer = true;
                
                if (currentQuestionIndex < shuffledQuestions.length) {
                    displayQuizQuestion();
                } else {
                    showQuizResult();
                }
            }, 1000);
        }

        function showQuizResult() {
            const total = shuffledQuestions.length;
            const isAllCorrect = (correctAnswers === total);
            const percentage = Math.round((correctAnswers / total) * 100);
            const currentDate = new Date();
            const formattedDate = `${currentDate.getDate()}/${currentDate.getMonth() + 1}/${currentDate.getFullYear()}`;
            
            if (isAllCorrect) {
                const certificateCode = 'CERT-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                
                document.getElementById('quizContainer').innerHTML = `
                    <div id="certificateWrapper">
                        <div class="certificate-container" id="certificate">
                            <div class="certificate-title">🎉 GIẤY CHỨNG NHẬN 🎉</div>
                            <div class="certificate-subtitle">Chứng nhận</div>
                            <div class="certificate-student">${escapeHtml(studentName)}</div>
                            <div class="certificate-course">đã hoàn thành xuất sắc khóa học</div>
                            <div class="certificate-course">"${escapeHtml(currentCourse.title)}"</div>
                            <div class="certificate-score">🏆 Với kết quả: ${correctAnswers}/${total} câu trả lời đúng (100%) 🏆</div>
                            <div class="certificate-date">📅 Ngày cấp: ${formattedDate}</div>
                            <div class="certificate-signatures">
                                <div class="certificate-signature">
                                    <div class="certificate-signature-line"></div>
                                    <div class="certificate-signature-text">Giáo viên</div>
                                </div>
                                <div class="certificate-signature">
                                    <div class="certificate-signature-line"></div>
                                    <div class="certificate-signature-text">Học viên</div>
                                </div>
                            </div>
                            <div class="certificate-code">Mã số: ${certificateCode}</div>
                            <div class="certificate-seal">🎓</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="btn-download-cert" onclick="downloadCertificate()">
                            <i class="fas fa-download"></i> Tải giấy chứng nhận (PNG)
                        </button>
                        <button class="btn-close-modal" onclick="closeModal()">
                            <i class="fas fa-times"></i> Đóng
                        </button>
                    </div>
                `;
            } else {
                document.getElementById('quizContainer').innerHTML = `
                    <div class="result-stats">
                        <h2>📊 KẾT QUẢ ĐÁNH GIÁ</h2>
                        <div class="score-circle">${percentage}%</div>
                        <div style="font-size: 32px; font-weight: bold; margin: 20px 0;">${correctAnswers}/${total}</div>
                        <div style="background: var(--bg-surface); border-radius: 16px; padding: 20px;">
                            <p>Bạn đã trả lời đúng <strong style="color: #28a745;">${correctAnswers}</strong> trên tổng số <strong>${total}</strong> câu hỏi.</p>
                            <p>Tỷ lệ đúng: <strong>${percentage}%</strong></p>
                        </div>
                        <p style="margin-top: 20px; color: var(--warning);">💪 Hãy học lại và thử đánh giá một lần nữa nhé! 💪</p>
                        <button class="btn-join" onclick="resetQuiz()" style="background: var(--warning);">🔄 Làm lại bài đánh giá</button>
                    </div>
                `;
            }
            
            document.getElementById('startQuizBtn').style.display = 'none';
        }

        async function downloadCertificate() {
            const certificate = document.getElementById('certificate');
            if (!certificate) {
                alert('Không tìm thấy giấy chứng nhận!');
                return;
            }
            
            try {
                const loadingDiv = document.createElement('div');
                loadingDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Đang tạo ảnh...';
                loadingDiv.style.position = 'fixed';
                loadingDiv.style.top = '50%';
                loadingDiv.style.left = '50%';
                loadingDiv.style.transform = 'translate(-50%, -50%)';
                loadingDiv.style.background = 'rgba(0,0,0,0.9)';
                loadingDiv.style.color = 'white';
                loadingDiv.style.padding = '15px 30px';
                loadingDiv.style.borderRadius = '50px';
                loadingDiv.style.zIndex = '9999';
                loadingDiv.style.fontFamily = 'DM Sans, sans-serif';
                document.body.appendChild(loadingDiv);
                
                const canvas = await html2canvas(certificate, {
                    scale: 2.5,
                    backgroundColor: '#ffffff',
                    logging: false,
                    useCORS: true
                });
                
                loadingDiv.remove();
                
                const link = document.createElement('a');
                const timestamp = new Date().getTime();
                const fileName = `GiayChungNhan_${studentName.replace(/[^a-zA-Z0-9]/g, '_')}_${currentCourse.title.replace(/[^a-zA-Z0-9]/g, '_')}_${timestamp}.png`;
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                const successMsg = document.createElement('div');
                successMsg.innerHTML = '<i class="fas fa-check-circle"></i> Đã tải giấy chứng nhận thành công!';
                successMsg.style.position = 'fixed';
                successMsg.style.bottom = '20px';
                successMsg.style.right = '20px';
                successMsg.style.background = '#28a745';
                successMsg.style.color = 'white';
                successMsg.style.padding = '12px 24px';
                successMsg.style.borderRadius = '50px';
                successMsg.style.zIndex = '9999';
                successMsg.style.animation = 'slideIn 0.3s ease';
                document.body.appendChild(successMsg);
                setTimeout(() => successMsg.remove(), 3000);
            } catch (error) {
                console.error('Error:', error);
                const errorMsg = document.createElement('div');
                errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Có lỗi khi tạo ảnh!';
                errorMsg.style.position = 'fixed';
                errorMsg.style.bottom = '20px';
                errorMsg.style.right = '20px';
                errorMsg.style.background = '#dc3545';
                errorMsg.style.color = 'white';
                errorMsg.style.padding = '12px 24px';
                errorMsg.style.borderRadius = '50px';
                errorMsg.style.zIndex = '9999';
                document.body.appendChild(errorMsg);
                setTimeout(() => errorMsg.remove(), 3000);
            }
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            correctAnswers = 0;
            canAnswer = true;
            startQuiz();
        }

        function closeModal() {
            document.getElementById('courseModal').classList.remove('active');
            currentQuestionIndex = 0;
            correctAnswers = 0;
            canAnswer = true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) {
            body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('eduhealth-theme', theme);
            if (themeBtn) {
                themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i> Chế độ sáng' : '<i class="fas fa-moon"></i> Chế độ tối';
            }
        }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        if (savedTheme === 'dark') setTheme('dark');
        else setTheme('light');
        if (themeBtn) themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        document.getElementById('courseModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('courseModal')) closeModal();
        });

        loadCourses();
    </script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .theme-toggle { background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-mid); transition: all 0.2s; }
        .theme-toggle:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
    </style>
</body>
</html>
