<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý khóa học - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, #4f8eff, #ff7eb3);
            --grad-pink-blue: linear-gradient(135deg, #ff6ba6, #4f8eff);
            --bg-body: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            --bg-surface: #fff5f8;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe0ec;
            --border-soft: #fef0f5;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05);
            --shadow-md: 0 20px 35px -12px rgba(0,0,0,0.1);
            --nav-bg: rgba(255,255,255,0.95);
            --tag-bg: #fce7f3;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body.dark {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
            --border-soft: #2d3a4e;
            --nav-bg: rgba(15,23,42,0.95);
            --tag-bg: #2d3a4e;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            transition: all 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            height: 74px;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: var(--grad-blue-pink);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 26px;
            font-weight: 700;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 500;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-card, .list-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 8px;
            font-size: 14px;
            display: block;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-dark);
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .btn-primary {
            background: var(--grad-blue-pink);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.3);
        }

        .btn-danger {
            background: var(--danger);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-warning {
            background: var(--warning);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-success {
            background: var(--success);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .course-item, .question-item {
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            transition: all 0.3s;
        }

        .course-item:hover, .question-item:hover {
            transform: translateX(5px);
            border-color: var(--pink-primary);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .flex-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge-course {
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .question-type {
            background: var(--blue-primary);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }

        .video-preview {
            margin-top: 10px;
            border-radius: 16px;
            overflow: hidden;
        }

        .video-preview iframe {
            width: 100%;
            max-width: 400px;
            height: 225px;
            border-radius: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Fraunces', serif;
            background: var(--grad-blue-pink);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .questions-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .quiz-option-block {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            padding: 8px;
            background: var(--card-bg);
            border-radius: 12px;
        }

        .quiz-option-block input[type="radio"] {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .container { padding: 90px 16px 40px; }
            .form-card, .list-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>
        <button class="theme-toggle" id="themeToggleBtn" style="background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 16px; cursor: pointer;"><i class="fas fa-moon"></i> Chế độ tối</button>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-chalkboard-user"></i> Quản lý khóa học</h1>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-number" id="totalCourses">0</div><div class="stat-label">Tổng khóa học</div></div>
            <div class="stat-card"><div class="stat-number" id="totalQuestions">0</div><div class="stat-label">Tổng câu hỏi</div></div>
            <div class="stat-card"><div class="stat-number" id="totalStudents">0</div><div class="stat-label">Học viên</div></div>
        </div>

        <!-- Form tạo khóa học -->
        <div class="form-card">
            <div class="card-title">
                <span><i class="fas fa-plus-circle"></i> Tạo khóa học mới</span>
            </div>
            <form id="courseForm">
                <div style="margin-bottom: 20px;">
                    <label class="form-label">📌 Tên khóa học</label>
                    <input type="text" class="form-control" id="courseTitle" required placeholder="VD: I. Da liễu học đường">
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">😊 Icon cảm xúc (emoji)</label>
                    <input type="text" class="form-control" id="courseEmoji" placeholder="VD: 😟, 🤒, 👁️" value="📚">
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">📝 Mô tả ngắn</label>
                    <textarea class="form-control" id="courseShortDesc" rows="2" placeholder="Mô tả ngắn về khóa học..."></textarea>
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">📖 Nội dung chi tiết</label>
                    <textarea class="form-control" id="courseContent" rows="4" placeholder="Nội dung chi tiết của khóa học..."></textarea>
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">🎥 Video giới thiệu (URL YouTube)</label>
                    <input type="text" class="form-control" id="courseVideoUrl" placeholder="https://www.youtube.com/watch?v=...">
                    <div id="videoPreview" class="video-preview" style="display: none;"></div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">🖼️ Ảnh bìa (URL)</label>
                    <input type="text" class="form-control" id="courseCoverImage" placeholder="URL ảnh bìa">
                </div>
                <input type="hidden" id="editCourseId" value="">
                <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Lưu khóa học</button>
            </form>
        </div>

        <!-- Form thêm câu hỏi -->
        <div class="form-card" id="questionForm" style="display: none;">
            <div class="card-title">
                <span><i class="fas fa-question-circle"></i> Thêm câu hỏi cho: <span id="selectedCourseName"></span></span>
                <button class="btn-danger" onclick="cancelQuestionForm()" style="padding: 8px 20px;">Hủy</button>
            </div>
            <input type="hidden" id="selectedCourseId">
            <div style="margin-bottom: 20px;">
                <label class="form-label">📝 Câu hỏi</label>
                <textarea class="form-control" id="questionText" rows="2" placeholder="Nhập nội dung câu hỏi..."></textarea>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">🔘 Loại câu hỏi</label>
                <select class="form-select" id="questionType">
                    <option value="multiple">Trắc nghiệm (A, B, C, D)</option>
                    <option value="truefalse">Đúng/Sai</option>
                </select>
            </div>
            <div id="multipleChoiceArea">
                <div class="quiz-option-block">
                    <input type="radio" name="correctAnswer" value="A">
                    <input type="text" class="form-control" id="answerA" placeholder="Đáp án A" style="flex:1">
                </div>
                <div class="quiz-option-block">
                    <input type="radio" name="correctAnswer" value="B">
                    <input type="text" class="form-control" id="answerB" placeholder="Đáp án B" style="flex:1">
                </div>
                <div class="quiz-option-block">
                    <input type="radio" name="correctAnswer" value="C">
                    <input type="text" class="form-control" id="answerC" placeholder="Đáp án C" style="flex:1">
                </div>
                <div class="quiz-option-block">
                    <input type="radio" name="correctAnswer" value="D">
                    <input type="text" class="form-control" id="answerD" placeholder="Đáp án D" style="flex:1">
                </div>
            </div>
            <div id="trueFalseArea" style="display: none;">
                <div class="quiz-option-block">
                    <input type="radio" name="tfAnswer" value="true">
                    <label>✅ Đúng</label>
                </div>
                <div class="quiz-option-block">
                    <input type="radio" name="tfAnswer" value="false">
                    <label>❌ Sai</label>
                </div>
            </div>
            <button class="btn-primary" onclick="addQuestion()" style="margin-top: 20px;"><i class="fas fa-plus"></i> Thêm câu hỏi</button>
        </div>

        <!-- Danh sách khóa học -->
        <div class="list-card">
            <div class="card-title">
                <span><i class="fas fa-list"></i> Danh sách khóa học</span>
                <button class="btn-primary" onclick="loadCourses()" style="padding: 8px 20px;"><i class="fas fa-sync-alt"></i> Tải lại</button>
            </div>
            <div id="coursesList"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b",
            measurementId: "G-GSP46EVLYG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCourses = [];
        let allQuestions = [];

        // Load courses
        async function loadCourses() {
            try {
                const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
                allCourses = [];
                snapshot.forEach(doc => {
                    allCourses.push({ id: doc.id, ...doc.data() });
                });
                
                // Load questions count
                const qSnapshot = await db.collection('courseQuestions').get();
                allQuestions = [];
                qSnapshot.forEach(doc => {
                    allQuestions.push({ id: doc.id, ...doc.data() });
                });
                
                updateStats();
                displayCourses();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function updateStats() {
            document.getElementById('totalCourses').textContent = allCourses.length;
            document.getElementById('totalQuestions').textContent = allQuestions.length;
            document.getElementById('totalStudents').textContent = Math.floor(Math.random() * 100) + 50;
        }

        function displayCourses() {
            const container = document.getElementById('coursesList');
            if (allCourses.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">📭 Chưa có khóa học nào</div>';
                return;
            }

            container.innerHTML = allCourses.map(course => {
                const courseQuestions = allQuestions.filter(q => q.courseId === course.id);
                return `
                    <div class="course-item">
                        <div class="flex-between">
                            <div style="flex:1">
                                <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px;">
                                    <span style="font-size: 32px;">${course.emoji || '📚'}</span>
                                    <h3 style="font-family: Fraunces, serif;">${escapeHtml(course.title)}</h3>
                                    <span class="badge-course">${courseQuestions.length} câu hỏi</span>
                                </div>
                                <div class="text-muted small" style="margin: 8px 0;">${escapeHtml(course.shortDesc || '')}</div>
                                ${course.videoUrl ? `<div class="video-preview"><iframe src="${getYouTubeEmbedUrl(course.videoUrl)}" frameborder="0" allowfullscreen></iframe></div>` : ''}
                                <div class="questions-list">
                                    <strong><i class="fas fa-list"></i> Danh sách câu hỏi:</strong>
                                    ${courseQuestions.length === 0 ? '<div class="text-muted" style="margin-top: 8px;">Chưa có câu hỏi nào</div>' : 
                                        courseQuestions.map(q => `
                                            <div class="question-item" style="margin-top: 8px; padding: 12px;">
                                                <div class="flex-between">
                                                    <div>
                                                        <strong>${escapeHtml(q.text)}</strong>
                                                        <span class="question-type">${q.type === 'multiple' ? 'Trắc nghiệm' : 'Đúng/Sai'}</span>
                                                    </div>
                                                    <div class="flex-buttons">
                                                        <button class="btn-danger" onclick="deleteQuestion('${q.id}')">Xóa</button>
                                                    </div>
                                                </div>
                                            </div>
                                        `).join('')
                                    }
                                    <button class="btn-success" onclick="showAddQuestionForm('${course.id}', '${escapeHtml(course.title)}')" style="margin-top: 12px;">
                                        <i class="fas fa-plus"></i> Thêm câu hỏi
                                    </button>
                                </div>
                            </div>
                            <div class="flex-buttons">
                                <button class="btn-warning" onclick="editCourse('${course.id}')"><i class="fas fa-edit"></i> Sửa</button>
                                <button class="btn-danger" onclick="deleteCourse('${course.id}')"><i class="fas fa-trash"></i> Xóa</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getYouTubeEmbedUrl(url) {
            if (!url) return '';
            let videoId = '';
            if (url.includes('youtube.com/watch')) {
                videoId = url.split('v=')[1]?.split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1]?.split('?')[0];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : '';
        }

        document.getElementById('courseVideoUrl')?.addEventListener('input', function() {
            const embedUrl = getYouTubeEmbedUrl(this.value);
            const preview = document.getElementById('videoPreview');
            if (embedUrl) {
                preview.innerHTML = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%; max-width:400px; height:225px; border-radius:12px;"></iframe>`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        document.getElementById('questionType')?.addEventListener('change', function() {
            const isMultiple = this.value === 'multiple';
            document.getElementById('multipleChoiceArea').style.display = isMultiple ? 'block' : 'none';
            document.getElementById('trueFalseArea').style.display = isMultiple ? 'none' : 'block';
        });

        document.getElementById('courseForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editCourseId').value;
            const courseData = {
                title: document.getElementById('courseTitle').value,
                emoji: document.getElementById('courseEmoji').value,
                shortDesc: document.getElementById('courseShortDesc').value,
                content: document.getElementById('courseContent').value,
                videoUrl: document.getElementById('courseVideoUrl').value,
                coverImage: document.getElementById('courseCoverImage').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (editId) {
                await db.collection('courses').doc(editId).update(courseData);
                showToast('Đã cập nhật khóa học!');
                document.getElementById('editCourseId').value = '';
            } else {
                courseData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                courseData.views = 0;
                await db.collection('courses').add(courseData);
                showToast('Đã thêm khóa học!');
            }
            document.getElementById('courseForm').reset();
            document.getElementById('videoPreview').style.display = 'none';
            loadCourses();
        });

        function editCourse(id) {
            const course = allCourses.find(c => c.id === id);
            if (!course) return;
            document.getElementById('courseTitle').value = course.title || '';
            document.getElementById('courseEmoji').value = course.emoji || '📚';
            document.getElementById('courseShortDesc').value = course.shortDesc || '';
            document.getElementById('courseContent').value = course.content || '';
            document.getElementById('courseVideoUrl').value = course.videoUrl || '';
            document.getElementById('courseCoverImage').value = course.coverImage || '';
            document.getElementById('editCourseId').value = id;
            if (course.videoUrl) {
                const embedUrl = getYouTubeEmbedUrl(course.videoUrl);
                if (embedUrl) {
                    document.getElementById('videoPreview').innerHTML = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%; max-width:400px; height:225px; border-radius:12px;"></iframe>`;
                    document.getElementById('videoPreview').style.display = 'block';
                }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteCourse(id) {
            if (confirm('Xóa khóa học này? Tất cả câu hỏi cũng sẽ bị xóa!')) {
                const questions = allQuestions.filter(q => q.courseId === id);
                const batch = db.batch();
                questions.forEach(q => batch.delete(db.collection('courseQuestions').doc(q.id)));
                batch.delete(db.collection('courses').doc(id));
                await batch.commit();
                showToast('Đã xóa khóa học!');
                loadCourses();
            }
        }

        function showAddQuestionForm(courseId, courseName) {
            document.getElementById('questionForm').style.display = 'block';
            document.getElementById('selectedCourseId').value = courseId;
            document.getElementById('selectedCourseName').innerHTML = courseName;
            document.getElementById('questionText').value = '';
            document.getElementById('answerA').value = '';
            document.getElementById('answerB').value = '';
            document.getElementById('answerC').value = '';
            document.getElementById('answerD').value = '';
            document.querySelectorAll('input[name="correctAnswer"]').forEach(r => r.checked = false);
            document.querySelectorAll('input[name="tfAnswer"]').forEach(r => r.checked = false);
            document.getElementById('questionType').value = 'multiple';
            document.getElementById('multipleChoiceArea').style.display = 'block';
            document.getElementById('trueFalseArea').style.display = 'none';
        }

        function cancelQuestionForm() {
            document.getElementById('questionForm').style.display = 'none';
            document.getElementById('selectedCourseId').value = '';
        }

        async function addQuestion() {
            const courseId = document.getElementById('selectedCourseId').value;
            const questionText = document.getElementById('questionText').value.trim();
            const questionType = document.getElementById('questionType').value;
            
            if (!questionText) {
                showToast('Vui lòng nhập câu hỏi!', true);
                return;
            }

            let questionData = {
                courseId: courseId,
                text: questionText,
                type: questionType,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (questionType === 'multiple') {
                const answerA = document.getElementById('answerA').value.trim();
                const answerB = document.getElementById('answerB').value.trim();
                const answerC = document.getElementById('answerC').value.trim();
                const answerD = document.getElementById('answerD').value.trim();
                let correctAnswer = null;
                document.querySelectorAll('input[name="correctAnswer"]').forEach(r => { if (r.checked) correctAnswer = r.value; });
                
                if (!answerA || !answerB || !answerC || !answerD || !correctAnswer) {
                    showToast('Vui lòng điền đầy đủ đáp án và chọn đáp án đúng!', true);
                    return;
                }
                questionData.answers = { A: answerA, B: answerB, C: answerC, D: answerD };
                questionData.correctAnswer = correctAnswer;
            } else {
                let correctAnswer = null;
                document.querySelectorAll('input[name="tfAnswer"]').forEach(r => { if (r.checked) correctAnswer = r.value; });
                if (!correctAnswer) {
                    showToast('Vui lòng chọn đáp án đúng (Đúng/Sai)!', true);
                    return;
                }
                questionData.correctAnswer = correctAnswer === 'true';
                questionData.answers = { A: 'Đúng', B: 'Sai' };
            }

            try {
                await db.collection('courseQuestions').add(questionData);
                showToast('Đã thêm câu hỏi!');
                cancelQuestionForm();
                loadCourses();
            } catch (error) {
                showToast('Lỗi: ' + error.message, true);
            }
        }

        async function deleteQuestion(id) {
            if (confirm('Xóa câu hỏi này?')) {
                await db.collection('courseQuestions').doc(id).delete();
                showToast('Đã xóa câu hỏi!');
                loadCourses();
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '50px';
            toast.style.zIndex = '1000';
            toast.style.animation = 'slideIn 0.3s ease';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) {
            body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('eduhealth-theme', theme);
            if (themeBtn) {
                themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i> Chế độ sáng' : '<i class="fas fa-moon"></i> Chế độ tối';
            }
        }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        if (savedTheme === 'dark') setTheme('dark');
        else setTheme('light');
        if (themeBtn) themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        loadCourses();
    </script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .text-muted { color: var(--text-dim); }
        .small { font-size: 13px; }
        .theme-toggle { background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-mid); }
        .theme-toggle:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
    </style>
</body>
</html>
